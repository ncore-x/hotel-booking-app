stages:
  - build
  - lint_format
  - migrations
  - test
  - deploy

build-job:
  stage: build
  before_script:
    - cp ${ENV} .env
    - cp ${TEST_ENV} .env-test
  script:
    - docker build -t booking-api-image .
    - docker compose -f docker-compose-ci.yml build booking_frontend_service booking_nginx_service

lint-job:
  stage: lint_format
  script:
    - docker run --rm booking-api-image uv run ruff check

format-job:
  stage: lint_format
  script:
    - docker run --rm booking-api-image uv run ruff format --check

migrations-job:
  stage: migrations
  before_script:
    - cp ${ENV} .env
  script:
    - docker run --rm --network myNetwork --env-file .env booking-api-image uv run alembic upgrade head

test-job:
  stage: test
  before_script:
    - cp ${TEST_ENV} .env-test
  script:
    - docker run --rm --network myNetwork --add-host host.docker.internal:host-gateway --env-file .env-test booking-api-image uv run pytest -s -v --tb=short

deploy-job:
  stage: deploy
  timeout: 10 minutes
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - cp ${ENV} .env
  script:
    - docker rm -f booking_nginx 2>/dev/null || true
    - docker compose -f docker-compose-ci.yml up -d booking_db booking_cache booking_elasticsearch
    - docker compose -f docker-compose-ci.yml up -d --force-recreate booking_back_service booking_celery_worker_service booking_celery_beat_service booking_frontend_service booking_nginx_service
    - docker exec booking_nginx nginx -s reload
    - |
      echo "Verifying deployment..."
      for i in $(seq 1 30); do
        if docker exec booking_back python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')" 2>/dev/null; then
          echo "Service is healthy!"
          exit 0
        fi
        echo "Attempt $i/30 - waiting..."
        sleep 2
      done
      echo "Service failed health check after 60s!"
      docker logs booking_back --tail=50
      exit 1
