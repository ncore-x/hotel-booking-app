server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      # container_name без leading slash: /booking_back → booking_back
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container_name'
      # compose service name (booking_back_service, grafana, etc.)
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'compose_service'
      # stdout / stderr
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - replacement: 'docker-logs'
        target_label: 'job'

    pipeline_stages:
      # Docker пишет JSON: {"log":"...", "stream":"stdout", "time":"..."}
      # Извлекаем поле log как основное содержимое строки
      - json:
          expressions:
            output: log
            stream: stream
      - output:
          source: output
      # Разбираем JSON внутри log-строки (структурированные логи FastAPI)
      # и извлекаем level как Loki-label для фильтрации
      - json:
          expressions:
            level: level
          source: output
      - labels:
          level:
