server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

compactor:
  compaction:
    block_retention: 168h  # 7 дней

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

# Ingestion rate limits — защита от OOM при всплесках трейсов
overrides:
  defaults:
    ingestion:
      rate_limit_bytes: 15000000   # 15 MB/s на tenant
      burst_size_bytes: 20000000   # 20 MB burst
      max_traces_per_user: 100000

