global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: "hotel_booking"
    metrics_path: /metrics
    authorization:
      credentials_file: /etc/prometheus/metrics_token
    static_configs:
      - targets: ["booking_back_service:8000"]

  - job_name: "celery"
    static_configs:
      - targets: ["celery_exporter:9808"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres_exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis_exporter:9121"]

  - job_name: "node"
    static_configs:
      - targets: ["node_exporter:9100"]

  - job_name: "blackbox"
    metrics_path: /probe
    params:
      module: [http_2xx_body]
    static_configs:
      - targets:
          - "http://booking_back_service:8000/api/v1/health"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: "blackbox_exporter:9115"

  - job_name: "blackbox_hotels"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - "http://booking_back_service:8000/api/v1/hotels"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: "blackbox_exporter:9115"
