global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "hotel_booking"
    metrics_path: /metrics
    authorization:
      credentials_file: /etc/prometheus/metrics_token
    static_configs:
      - targets: ["booking_back_service:8000"]

  - job_name: "celery"
    metrics_path: /metrics
    static_configs:
      - targets: ["celery_exporter:9808"]

  - job_name: "cadvisor"
    metrics_path: /metrics
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "postgres"
    metrics_path: /metrics
    static_configs:
      - targets: ["postgres_exporter:9187"]
