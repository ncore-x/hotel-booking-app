events {
    worker_connections 1024;
}

http {
    # --- Rate limiting zones ---
    limit_req_zone $binary_remote_addr zone=api:10m rate=1r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

    # --- Bot filtering ---
    map $http_user_agent $bad_bot {
        default 0;
        ~*(ahrefs|semrush|mj12bot|dotbot|petalbot) 1;
        ~*(scanner|crawler|spider|bot) 0;
        ~*(googlebot|bingbot|yandex) 0;
    }

    # --- HTTPS server ---
    server {
        listen 443 ssl;
        server_name python-project.online;

        # IP blocklist
        deny 115.190.90.107;

        # Bot protection
        if ($bad_bot) {
            return 403;
        }

        # --- Security headers ---
        server_tokens off;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https://fastapi.tiangolo.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'self'" always;

        # --- SSL (Let's Encrypt) ---
        ssl_certificate /etc/letsencrypt/live/python-project.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/python-project.online/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        # --- Proxy timeouts ---
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # --- Request body size (image uploads up to 6MB) ---
        client_max_body_size 6m;

        # --- Block sensitive files ---
        location ~ /\.(ht|git|env|sql|log|tar|gz) {
            deny all;
            return 404;
        }

        # --- Block internal endpoints from outside ---
        location /metrics {
            deny all;
            return 404;
        }

        location /docs {
            deny all;
            return 404;
        }

        location /redoc {
            deny all;
            return 404;
        }

        location /openapi.json {
            deny all;
            return 404;
        }

        # --- API proxy ---
        location /api/ {
            limit_req zone=general burst=20 nodelay;

            proxy_pass http://booking_back:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_redirect http://$host/ https://$host/;
            proxy_redirect http://$server_name/ https://$server_name/;
        }

        # --- Static files from backend (images) ---
        location /static/ {
            proxy_pass http://booking_back:8000;
            proxy_set_header Host $host;
        }

        # --- Frontend (SPA) ---
        location / {
            proxy_pass http://booking_frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # --- HTTP to HTTPS redirect ---
    server {
        listen 80;
        server_name python-project.online;
        return 301 https://$server_name$request_uri;
    }
}
