services:
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    ports:
      - "9080:9080"
    networks:
      - myNetwork
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    privileged: true

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    networks:
      - myNetwork
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - lokidata:/loki

  tempo:
    image: grafana/tempo:2.6.1
    container_name: tempo
    restart: unless-stopped
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    networks:
      - myNetwork
    volumes:
      - ./tempo.yaml:/etc/tempo/tempo.yaml
      - tempodata:/var/tempo
    command: -config.file=/etc/tempo/tempo.yaml

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    networks:
      - myNetwork
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./metrics_token:/etc/prometheus/metrics_token:ro
      - prometheusdata:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - myNetwork
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_ALERTING_ENABLED=false
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/alerting:/etc/grafana/provisioning/alerting
      - grafanadata:/var/lib/grafana

  celery_exporter:
    image: danihodovic/celery-exporter:latest
    container_name: celery_exporter
    restart: unless-stopped
    ports:
      - "9808:9808"
    networks:
      - myNetwork
    env_file:
      - .env
    environment:
      - CE_BROKER_URL=redis://${REDIS_HOST}:${REDIS_PORT}

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - myNetwork
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres_exporter
    restart: unless-stopped
    ports:
      - "9187:9187"
    networks:
      - myNetwork
    env_file:
      - .env
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER}:${DB_PASS}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=disable"

  booking_back_service:
    build:
      context: .
    container_name: 'booking_back'
    restart: unless-stopped
    ports:
      - '7777:8000'
    networks:
      - myNetwork
    env_file:
      - .env
    volumes:
      - imagesdata:/app/src/static/images
    command: 'sh -c "uv run alembic upgrade head && uv run uvicorn src.main:app --host 0.0.0.0 --port 8000"'

  booking_celery_worker_service:
    build:
      context: .
    container_name: 'booking_celery_worker'
    restart: unless-stopped
    networks:
      - myNetwork
    env_file:
      - .env
    volumes:
      - imagesdata:/app/src/static/images
    command: 'uv run celery --app=src.tasks.celery_app:celery_instance worker -l INFO'

  booking_celery_beat_service:
    build:
      context: .
    container_name: 'booking_celery_beat'
    restart: unless-stopped
    networks:
      - myNetwork
    env_file:
      - .env
    command: 'uv run celery --app=src.tasks.celery_app:celery_instance beat -l INFO'

networks:
  myNetwork:
    external: true

volumes:
  prometheusdata:
  grafanadata:
  tempodata:
  lokidata:
  imagesdata:
