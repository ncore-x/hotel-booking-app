services:
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    ports:
      - "9080:9080"
    networks:
      - myNetwork
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    privileged: true

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    networks:
      - myNetwork
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    networks:
      - myNetwork
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./metrics_token:/etc/prometheus/metrics_token:ro
      - prometheusdata:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - myNetwork
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_ALERTING_ENABLED=false
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/alerting:/etc/grafana/provisioning/alerting
      - grafanadata:/var/lib/grafana

  celery_exporter:
    image: danihodovic/celery-exporter:latest
    platform: linux/amd64
    container_name: celery_exporter
    ports:
      - "9808:9808"
    networks:
      - myNetwork
    env_file:
      - .env
    environment:
      - CE_BROKER_URL=redis://${REDIS_HOST}:${REDIS_PORT}

  booking_back_service:
    build:
      context: .
    container_name: 'booking_back'
    ports:
      - '7777:8000'
    networks:
      - myNetwork
    env_file:
      - .env
    command: 'sh -c "uv run alembic upgrade head && uv run uvicorn src.main:app --host 0.0.0.0 --port 8000"'

  booking_celery_worker_service:
    build:
      context: .
    container_name: 'booking_celery_worker'
    networks:
      - myNetwork
    env_file:
      - .env
    command: 'uv run celery --app=src.tasks.celery_app:celery_instance worker -l INFO'

  booking_celery_beat_service:
    build:
      context: .
    container_name: 'booking_celery_beat'
    networks:
      - myNetwork
    env_file:
      - .env
    command: 'uv run celery --app=src.tasks.celery_app:celery_instance beat -l INFO'

networks:
  myNetwork:
    external: true

volumes:
  prometheusdata:
  grafanadata:
