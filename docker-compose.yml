services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  booking_db:
    image: postgres:17
    container_name: booking_db
    restart: unless-stopped
    networks:
      - myNetwork
    ports:
      - "6432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg-booking-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  booking_cache:
    image: redis:8
    container_name: booking_cache
    restart: unless-stopped
    networks:
      - myNetwork
    ports:
      - "7379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  booking_elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.4
    container_name: booking_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    networks:
      - myNetwork
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1g

  # ── Application ───────────────────────────────────────────────────────────────

  booking_back_service:
    container_name: booking_back
    build:
      context: .
      dockerfile: Dockerfile
    image: booking_back_image
    restart: unless-stopped
    depends_on:
      booking_db:
        condition: service_healthy
      booking_cache:
        condition: service_healthy
    networks:
      - myNetwork
    ports:
      - "7777:8000"
    env_file:
      - .env
    volumes:
      - imagesdata:/app/src/static/images
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  booking_celery_worker_service:
    container_name: booking_celery_worker
    image: booking_back_image
    restart: unless-stopped
    depends_on:
      booking_back_service:
        condition: service_healthy
    networks:
      - myNetwork
    env_file:
      - .env
    volumes:
      - imagesdata:/app/src/static/images
    command: 'uv run celery --app=src.tasks.celery_app:celery_instance worker -l INFO'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  booking_celery_beat_service:
    container_name: booking_celery_beat
    image: booking_back_image
    restart: unless-stopped
    depends_on:
      booking_back_service:
        condition: service_healthy
    networks:
      - myNetwork
    env_file:
      - .env
    command: 'uv run celery --app=src.tasks.celery_app:celery_instance beat -l INFO'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  booking_frontend_service:
    container_name: booking_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      booking_back_service:
        condition: service_healthy
    networks:
      - myNetwork
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  booking_nginx_service:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    image: hotel-booking-app-booking_nginx_service:latest
    container_name: booking_nginx
    restart: unless-stopped
    depends_on:
      booking_back_service:
        condition: service_healthy
      booking_frontend_service:
        condition: service_healthy
    networks:
      - myNetwork
    ports:
      - "80:80"
      - "443:443"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ── Observability ─────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    networks:
      - myNetwork
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./metrics_token:/etc/prometheus/metrics_token:ro
      - prometheusdata:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
      - "--query.max-samples=10000000"
      - "--query.timeout=1m"
      - "--query.max-concurrency=10"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 2g

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_healthy
      loki:
        condition: service_started
    ports:
      - "3000:3000"
    networks:
      - myNetwork
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:?GF_ADMIN_PASSWORD is required}
      - GF_UNIFIED_ALERTING_ENABLED=${GRAFANA_ALERTING_ENABLED:-false}
      - GF_ALERTING_ENABLED=false
      - GF_SMTP_ENABLED=${GF_SMTP_ENABLED:-false}
      - GF_SMTP_HOST=${SMTP_HOST:-localhost}:${SMTP_PORT:-587}
      - GF_SMTP_USER=${SMTP_USER:-}
      - GF_SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - GF_SMTP_FROM_ADDRESS=${SMTP_FROM:-noreply@hotelbooking.example}
      - GF_SMTP_FROM_NAME=Hotel Booking Alerts
      - ALERT_EMAIL=${ALERT_EMAIL}
    volumes:
      - ./grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/alerting:/etc/grafana/provisioning/alerting
      - grafanadata:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512m

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    networks:
      - myNetwork
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - lokidata:/loki
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512m

  tempo:
    image: grafana/tempo:2.6.1
    container_name: tempo
    restart: unless-stopped
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    networks:
      - myNetwork
    volumes:
      - ./tempo.yaml:/etc/tempo/tempo.yaml
      - tempodata:/var/tempo
    command: -config.file=/etc/tempo/tempo.yaml
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "-O-", "http://localhost:3200/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512m

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_started
    ports:
      - "9080:9080"
    networks:
      - myNetwork
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    privileged: true
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256m

  # ── Exporters ─────────────────────────────────────────────────────────────────

  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - myNetwork
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    pid: host
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128m

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres_exporter
    restart: unless-stopped
    ports:
      - "9187:9187"
    networks:
      - myNetwork
    env_file:
      - .env
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER}:${DB_PASS}@booking_db:5432/${DB_NAME}?sslmode=disable"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128m

  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis_exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    networks:
      - myNetwork
    environment:
      REDIS_ADDR: "redis://booking_cache:6379"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 64m

  celery_exporter:
    image: danihodovic/celery-exporter:latest
    platform: linux/amd64
    container_name: celery_exporter
    restart: unless-stopped
    ports:
      - "9808:9808"
    networks:
      - myNetwork
    environment:
      - CE_BROKER_URL=redis://booking_cache:6379
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128m

  blackbox_exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox_exporter
    restart: unless-stopped
    ports:
      - "9115:9115"
    networks:
      - myNetwork
    volumes:
      - ./blackbox.yml:/etc/blackbox_exporter/config.yml
    command: --config.file=/etc/blackbox_exporter/config.yml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:9115 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 64m

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - myNetwork
    volumes:
      - /:/rootfs:ro
      - /run/docker.sock:/var/run/docker.sock
      - /run/containerd/containerd.sock:/run/containerd/containerd.sock
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    command:
      - "--docker_only=true"
    privileged: true
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512m

networks:
  myNetwork:
    external: true

volumes:
  pg-booking-data:
    external: true
  imagesdata:
  prometheusdata:
  grafanadata:
  tempodata:
  lokidata:
