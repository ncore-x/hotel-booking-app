apiVersion: 1

# Периоды тишины: warning-алерты не приходят ночью и в выходные
time_intervals:
  - name: outside-business-hours
    time_intervals:
      # Будни 22:00–08:00 UTC
      - times:
          - start_time: "22:00"
            end_time: "24:00"
          - start_time: "00:00"
            end_time: "08:00"
        weekdays: ["monday:friday"]
      # Весь день в выходные
      - weekdays: ["saturday", "sunday"]

policies:
  - orgId: 1
    receiver: Telegram
    group_by:
      - alertname
      - grafana_folder
      - name
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 1h
    routes:
      - receiver: Telegram Watchdog
        matchers:
          - alertname = Watchdog
        group_by: [alertname]
        group_wait: 10s
        group_interval: 24h
        repeat_interval: 24h

      - receiver: Critical
        matchers:
          - severity = critical
        group_by: [grafana_folder]
        group_wait: 2m
        group_interval: 2m
        repeat_interval: 1h

      # Warning-алерты подавляются вне рабочих часов (22:00–08:00 UTC, выходные)
      - receiver: Telegram
        matchers:
          - severity = warning
        mute_time_intervals:
          - outside-business-hours
        group_wait: 1m
        group_interval: 10m
        repeat_interval: 4h
