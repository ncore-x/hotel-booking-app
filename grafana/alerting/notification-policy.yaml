apiVersion: 1

policies:
  - orgId: 1
    receiver: Telegram
    group_by:
      - alertname
      - grafana_folder
      - name
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 1h
    routes:
      - receiver: Telegram Watchdog
        matchers:
          - alertname = Watchdog
        group_by: [alertname]
        group_wait: 10s
        group_interval: 24h
        repeat_interval: 24h
        continue: false

      - receiver: Email Critical
        matchers:
          - severity = critical
        continue: true
