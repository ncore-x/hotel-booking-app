apiVersion: 1

policies:
  - orgId: 1
    receiver: Warning
    group_by:
      - alertname
      - grafana_folder
      - name
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 1h
    routes:
      - receiver: Watchdog
        matchers:
          - alertname = Watchdog
        group_by: [alertname]
        group_wait: 1m
        group_interval: 24h
        repeat_interval: 24h

      - receiver: Critical
        matchers:
          - severity = critical
        group_by: [grafana_folder]
        group_wait: 2m
        group_interval: 2m
        repeat_interval: 1h

      # Warning-алерты подавляются вне рабочих часов (22:00–08:00 UTC, выходные)
      - receiver: Warning
        matchers:
          - severity = warning
        mute_time_intervals:
          - outside-business-hours
        group_wait: 1m
        group_interval: 10m
        repeat_interval: 4h
