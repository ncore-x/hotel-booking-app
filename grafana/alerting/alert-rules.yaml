apiVersion: 1

groups:
  - orgId: 1
    name: hotel-booking
    folder: Hotel Booking Alerts
    interval: 1m
    rules:

      - uid: dfhd41peywc8we
        title: High 5xx Rate
        condition: threshold
        for: 2m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: Высокий процент 5xx ошибок
          description: Более 1% запросов завершаются ошибками 5xx на протяжении 2 минут
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 'sum(rate(fastapi_responses_total{app_name="hotel_booking", status_code=~"5.."}[5m])) / sum(rate(fastapi_responses_total{app_name="hotel_booking"}[5m]))'
              refId: A
              instant: true
          - refId: threshold
            relativeTimeRange: {from: 0, to: 0}
            datasourceUid: "-100"
            model:
              refId: threshold
              type: classic_conditions
              conditions:
                - evaluator: {params: [0.01], type: gt}
                  operator: {type: and}
                  query: {params: [A]}
                  reducer: {params: [], type: last}
                  type: query

      - uid: efhd426q32hhcb
        title: High p99 Latency
        condition: threshold
        for: 2m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: Высокая задержка p99
          description: p99 latency превысил 500ms на протяжении 2 минут
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 'histogram_quantile(0.99, sum(rate(fastapi_requests_duration_seconds_bucket{app_name="hotel_booking", path!="/metrics"}[5m])) by (le))'
              refId: A
              instant: true
          - refId: threshold
            relativeTimeRange: {from: 0, to: 0}
            datasourceUid: "-100"
            model:
              refId: threshold
              type: classic_conditions
              conditions:
                - evaluator: {params: [0.5], type: gt}
                  operator: {type: and}
                  query: {params: [A]}
                  reducer: {params: [], type: last}
                  type: query

      - uid: dfhd42ylqrr40b
        title: Service Health Degraded
        condition: threshold
        for: 1m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: Сервис деградировал
          description: "Endpoint /health вернул 503 — БД или Redis недоступны"
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 'sum(increase(fastapi_responses_total{app_name="hotel_booking", path="/api/v1/health", status_code="503"}[2m]))'
              refId: A
              instant: true
          - refId: threshold
            relativeTimeRange: {from: 0, to: 0}
            datasourceUid: "-100"
            model:
              refId: threshold
              type: classic_conditions
              conditions:
                - evaluator: {params: [0], type: gt}
                  operator: {type: and}
                  query: {params: [A]}
                  reducer: {params: [], type: last}
                  type: query

      - uid: cfhd43ab12cd3e
        title: Celery Worker Down
        condition: threshold
        for: 2m
        noDataState: Alerting
        execErrState: Alerting
        labels:
          severity: critical
        annotations:
          summary: Celery воркер недоступен
          description: Prometheus не получает метрики от celery-exporter более 2 минут — воркеры могут быть остановлены
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 'absent(celery_worker_up) or sum(celery_worker_up) == 0'
              refId: A
              instant: true
          - refId: threshold
            relativeTimeRange: {from: 0, to: 0}
            datasourceUid: "-100"
            model:
              refId: threshold
              type: classic_conditions
              conditions:
                - evaluator: {params: [0], type: gt}
                  operator: {type: and}
                  query: {params: [A]}
                  reducer: {params: [], type: last}
                  type: query

      - uid: cfhd44ef56gh7i
        title: Celery Queue High
        condition: threshold
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: Очередь Celery переполнена
          description: В очереди celery более 50 задач на протяжении 5 минут — воркеры не справляются
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 'sum(celery_queue_length) by (queue_name)'
              refId: A
              instant: true
          - refId: threshold
            relativeTimeRange: {from: 0, to: 0}
            datasourceUid: "-100"
            model:
              refId: threshold
              type: classic_conditions
              conditions:
                - evaluator: {params: [50], type: gt}
                  operator: {type: and}
                  query: {params: [A]}
                  reducer: {params: [], type: last}
                  type: query

      - uid: afhd42ync7f28f
        title: Service Down
        condition: threshold
        for: 5m
        noDataState: Alerting
        execErrState: Alerting
        labels:
          severity: critical
        annotations:
          summary: Сервис недоступен
          description: Prometheus не получает метрики от hotel_booking более 5 минут
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 'absent(fastapi_requests_total{app_name="hotel_booking"})'
              refId: A
              instant: true
          - refId: threshold
            relativeTimeRange: {from: 0, to: 0}
            datasourceUid: "-100"
            model:
              refId: threshold
              type: classic_conditions
              conditions:
                - evaluator: {params: [0], type: gt}
                  operator: {type: and}
                  query: {params: [A]}
                  reducer: {params: [], type: last}
                  type: query
