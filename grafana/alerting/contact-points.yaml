apiVersion: 1

contactPoints:
  - orgId: 1
    name: Telegram
    receivers:
      - uid: afhd40ntpeoe8a
        type: telegram
        settings:
          bottoken: "${TELEGRAM_BOT_TOKEN}"
          chatid: "1097986020"
          message: |
            {{ range .Alerts }}[{{ .Status | toUpper }}] {{ .Labels.alertname }}
            {{ .Annotations.summary }}
            {{ .Annotations.description }}{{ end }}
        disableResolveMessage: false
