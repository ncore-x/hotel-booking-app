services:
  booking_db:
    image: postgres:17
    container_name: booking_db
    restart: unless-stopped
    networks:
      - myNetwork
    ports:
      - "6432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg-booking-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  booking_cache:
    image: redis:8
    container_name: booking_cache
    restart: unless-stopped
    networks:
      - myNetwork
    ports:
      - "7379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  booking_back_service:
    container_name: 'booking_back'
    image: booking-api-image:latest
    restart: unless-stopped
    depends_on:
      booking_db:
        condition: service_healthy
      booking_cache:
        condition: service_healthy
    networks:
      - myNetwork
    ports:
      - "7777:8000"
    env_file:
      - .env
    volumes:
      - imagesdata:/app/src/static/images
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  booking_celery_worker_service:
    container_name: 'booking_celery_worker'
    image: booking-api-image:latest
    restart: unless-stopped
    depends_on:
      booking_back_service:
        condition: service_healthy
    networks:
      - myNetwork
    env_file:
      - .env
    volumes:
      - imagesdata:/app/src/static/images
    command: 'uv run celery --app=src.tasks.celery_app:celery_instance worker -l INFO'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  booking_celery_beat_service:
    container_name: 'booking_celery_beat'
    image: booking-api-image:latest
    restart: unless-stopped
    depends_on:
      booking_back_service:
        condition: service_healthy
    networks:
      - myNetwork
    env_file:
      - .env
    command: 'uv run celery --app=src.tasks.celery_app:celery_instance beat -l INFO'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  booking_frontend_service:
    container_name: 'booking_frontend'
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      booking_back_service:
        condition: service_healthy
    networks:
      - myNetwork
    ports:
      - "3001:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  booking_elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.4
    container_name: booking_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    networks:
      - myNetwork
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1g

  booking_nginx_service:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: booking_nginx
    restart: unless-stopped
    depends_on:
      booking_back_service:
        condition: service_healthy
      booking_frontend_service:
        condition: service_healthy
    networks:
      - myNetwork
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

networks:
  myNetwork:
    external: true

volumes:
  pg-booking-data:
    external: true
  imagesdata:
