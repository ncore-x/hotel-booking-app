services:
  booking_back_service:
    container_name: 'booking_back'
    image: booking-api-image:latest
    networks:
      - myNetwork
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "7777:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  booking_celery_worker_service:
    container_name: 'booking_celery_worker'
    image: booking-api-image:latest
    depends_on:
      booking_back_service:
        condition: service_healthy
    networks:
      - myNetwork
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    command: 'uv run celery --app=src.tasks.celery_app:celery_instance worker -l INFO'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  booking_celery_beat_service:
    container_name: 'booking_celery_beat'
    image: booking-api-image:latest
    depends_on:
      booking_back_service:
        condition: service_healthy
    networks:
      - myNetwork
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    command: 'uv run celery --app=src.tasks.celery_app:celery_instance beat -l INFO'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  booking_frontend_service:
    container_name: 'booking_frontend'
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      booking_back_service:
        condition: service_healthy
    networks:
      - myNetwork
    ports:
      - "3001:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  booking_elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.4
    container_name: booking_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    networks:
      - myNetwork
    ports:
      - "9200:9200"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1g

networks:
  myNetwork:
    external: true
